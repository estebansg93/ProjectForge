services:
  postgres:
    image: postgres:16-alpine
    container_name: projectforge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: projectforge
      POSTGRES_USER: projectforge
      POSTGRES_PASSWORD: projectforge_dev
    ports:
      - "5432:5432"
    volumes:
      - projectforge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projectforge -d projectforge"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  projectforge_pgdata:
